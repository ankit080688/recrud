<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Job Listings — Recrud</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    html { background: #F9FAFB; }
    html.dark { background: #111827; }
  </style>
</head>
<body class="min-h-screen text-gray-800 dark:text-gray-200">
  <!-- Top Nav -->
  <header class="bg-white dark:bg-gray-800 shadow p-4 flex justify-between items-center">
    <h1 class="text-2xl font-semibold">Recrud</h1>
    <div class="flex items-center space-x-4">
      <button id="theme-toggle" class="p-2 rounded focus:ring-2 focus:ring-indigo-500">
        <svg id="icon-light" class="h-6 w-6 text-yellow-400 hidden" fill="currentColor" viewBox="0 0 20 20">
          <path d="M10 3l1 2 2 .3-1.5 1 .3 2L10 8l-1.8.6.3-2L7 5.3l2-.3 1-2z"/>
        </svg>
        <svg id="icon-dark" class="h-6 w-6 text-gray-200" fill="currentColor" viewBox="0 0 20 20">
          <path d="M17.3 13.3a8 8 0 11-10.6-10.6 8 8 0 0010.6 10.6z"/>
        </svg>
      </button>
      <img src="https://via.placeholder.com/32" alt="User" class="w-8 h-8 rounded-full"/>
    </div>
  </header>

  <main class="max-w-7xl mx-auto px-4 py-6 flex flex-col lg:flex-row gap-6">
    <!-- Filters Sidebar -->
    <aside class="w-full lg:w-1/4 bg-white dark:bg-gray-800 rounded-lg shadow p-6">
      <h2 class="text-lg font-semibold mb-4">Filters</h2>
      <div class="space-y-4">
        <div>
          <label class="block text-sm font-medium">Search</label>
          <input type="text" placeholder="Keyword or title"
            class="mt-1 w-full px-3 py-2 bg-gray-100 dark:bg-gray-700 border rounded focus:ring-indigo-500 focus:border-indigo-500"/>
        </div>
        <div>
          <label class="block text-sm font-medium">Location</label>
          <input type="text" placeholder="e.g. Bengaluru, Remote"
            class="mt-1 w-full px-3 py-2 bg-gray-100 dark:bg-gray-700 border rounded focus:ring-indigo-500 focus:border-indigo-500"/>
        </div>
        <div>
          <span class="block text-sm font-medium">Job Type</span>
          <div class="mt-2 space-y-1">
            <label class="inline-flex items-center"><input type="checkbox" class="form-checkbox"/><span class="ml-2">Full-time</span></label>
            <label class="inline-flex items-center"><input type="checkbox" class="form-checkbox"/><span class="ml-2">Part-time</span></label>
            <label class="inline-flex items-center"><input type="checkbox" class="form-checkbox"/><span class="ml-2">Contract</span></label>
            <label class="inline-flex items-center"><input type="checkbox" class="form-checkbox"/><span class="ml-2">Remote</span></label>
          </div>
        </div>
        <button class="w-full mt-4 py-2 bg-indigo-600 text-white rounded hover:bg-indigo-700">Apply Filters</button>
      </div>
    </aside>

    <!-- Job Listings -->
    <section class="flex-1">
      <div class="flex items-center justify-between mb-4">
        <h2 class="text-xl font-semibold">Available Jobs</h2>
        <!-- View Toggle -->
        <div class="flex space-x-2">
          <button id="grid-view-btn" class="p-2 rounded bg-indigo-600 text-white" title="Grid view">
            <svg class="h-5 w-5" fill="currentColor" viewBox="0 0 20 20">
              <path d="M3 3h6v6H3V3zM3 11h6v6H3v-6zM11 3h6v6h-6V3zM11 11h6v6h-6v-6z"/>
            </svg>
          </button>
          <button id="list-view-btn" class="p-2 rounded bg-gray-200 dark:bg-gray-700 text-gray-600 dark:text-gray-300" title="List view">
            <svg class="h-5 w-5" fill="currentColor" viewBox="0 0 20 20">
              <path d="M4 6h12v2H4V6zm0 4h12v2H4v-2zm0 4h12v2H4v-2z"/>
            </svg>
          </button>
        </div>
      </div>

      <!-- Container for both modes -->
      <div id="jobs-container"></div>
    </section>
  </main>

  <script>
    // Theme toggle (unchanged)...
    const htmlEl = document.documentElement,
          tgl = document.getElementById('theme-toggle'),
          iL = document.getElementById('icon-light'),
          iD = document.getElementById('icon-dark');
    tgl.onclick = ()=>{
      htmlEl.classList.toggle('dark');
      localStorage.setItem('theme', htmlEl.classList.contains('dark')?'dark':'light');
      iL.classList.toggle('hidden', !htmlEl.classList.contains('dark'));
      iD.classList.toggle('hidden', htmlEl.classList.contains('dark'));
    };
    (()=>{
      const t = localStorage.getItem('theme');
      if(t==='dark' || (!t && matchMedia('(prefers-color-scheme: dark)').matches)) htmlEl.classList.add('dark');
      iL.classList.toggle('hidden', !htmlEl.classList.contains('dark'));
      iD.classList.toggle('hidden', htmlEl.classList.contains('dark'));
    })();

    // Sample data
    const jobs = [
      { role:'Frontend Engineer', company:'Acme Corp', loc:'Bengaluru', desc:'Build user-facing features in React.', posted:'3 days ago', salary:'₹12L–15L' },
      { role:'Backend Engineer', company:'BetaTech', loc:'Remote', desc:'Design scalable Django services.', posted:'1 week ago', salary:'$80k–$100k' },
      { role:'DevOps Specialist', company:'Cloudify', loc:'Mumbai', desc:'Implement CI/CD pipelines.', posted:'2 days ago', salary:'₹18L–22L' },
      // add more as needed
    ];

    const container = document.getElementById('jobs-container'),
          gridBtn   = document.getElementById('grid-view-btn'),
          listBtn   = document.getElementById('list-view-btn');

    function renderGrid(){
      container.innerHTML = `<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
        ${jobs.map(j=>`
          <div class="bg-white dark:bg-gray-800 rounded-lg shadow p-6 flex flex-col">
            <h3 class="text-lg font-bold">${j.role}</h3>
            <p class="text-gray-600 dark:text-gray-400 mt-1">${j.company} • ${j.loc}</p>
            <p class="text-sm text-gray-500 dark:text-gray-400 mt-2 flex-1">${j.desc}</p>
            <div class="mt-4 flex items-center justify-between text-sm text-gray-500 dark:text-gray-400">
              <span>${j.posted}</span><span>${j.salary}</span>
            </div>
            <div class="mt-4 flex space-x-2">
              <a href="#" class="flex-1 text-center py-2 bg-indigo-600 text-white rounded hover:bg-indigo-700">View</a>
              <a href="#" class="flex-1 text-center py-2 bg-green-600 text-white rounded hover:bg-green-700">Apply</a>
            </div>
          </div>`).join('')}
      </div>`;
    }

    function renderList(){
      container.innerHTML = `<div class="overflow-auto">
        <table class="min-w-full bg-white dark:bg-gray-800 rounded-lg">
          <thead>
            <tr class="border-b dark:border-gray-700">
              <th class="px-4 py-2 text-left">Role</th>
              <th class="px-4 py-2 text-left">Company &amp; Location</th>
              <th class="px-4 py-2 text-left">Posted</th>
              <th class="px-4 py-2 text-left">Salary</th>
              <th class="px-4 py-2">Actions</th>
            </tr>
          </thead>
          <tbody>
            ${jobs.map(j=>`
              <tr class="border-b dark:border-gray-700 hover:bg-gray-50 dark:hover:bg-gray-700">
                <td class="px-4 py-2">${j.role}</td>
                <td class="px-4 py-2">${j.company} • ${j.loc}</td>
                <td class="px-4 py-2">${j.posted}</td>
                <td class="px-4 py-2">${j.salary}</td>
                <td class="px-4 py-2 space-x-2 text-center">
                  <a href="#" class="px-3 py-1 bg-indigo-600 text-white rounded hover:bg-indigo-700 text-sm">View</a>
                  <a href="#" class="px-3 py-1 bg-green-600 text-white rounded hover:bg-green-700 text-sm">Apply</a>
                </td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>`;
    }

    gridBtn.onclick = ()=>{
      renderGrid();
      gridBtn.classList.replace('bg-gray-200','bg-indigo-600');
      gridBtn.classList.replace('text-gray-600','text-white');
      listBtn.classList.replace('bg-indigo-600','bg-gray-200');
      listBtn.classList.replace('text-white','text-gray-600');
    };
    listBtn.onclick = ()=>{
      renderList();
      listBtn.classList.replace('bg-gray-200','bg-indigo-600');
      listBtn.classList.replace('text-gray-600','text-white');
      gridBtn.classList.replace('bg-indigo-600','bg-gray-200');
      gridBtn.classList.replace('text-white','text-gray-600');
    };

    // Initialize
    renderGrid();
    gridBtn.click();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Candidate Search — Recrud</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    html { background: #F9FAFB; }
    html.dark { background: #111827; }
  </style>
</head>
<body class="min-h-screen text-gray-800 dark:text-gray-200">
  <!-- Header -->
  <header class="bg-white dark:bg-gray-800 shadow p-4 flex justify-between items-center">
    <h1 class="text-2xl font-semibold">Recrud</h1>
    <div class="flex items-center space-x-4">
      <button id="theme-toggle" class="p-2 rounded focus:ring-2 focus:ring-indigo-500">
        <svg id="icon-light" class="h-6 w-6 text-yellow-400 hidden" fill="currentColor" viewBox="0 0 20 20">
          <path d="M10 3l1 2 2 .3-1.5 1 .3 2L10 8l-1.8.6.3-2L7 5.3l2-.3 1-2z"/>
        </svg>
        <svg id="icon-dark" class="h-6 w-6 text-gray-200" fill="currentColor" viewBox="0 0 20 20">
          <path d="M17.3 13.3a8 8 0 11-10.6-10.6 8 8 0 0010.6 10.6z"/>
        </svg>
      </button>
      <img src="https://via.placeholder.com/32" alt="User" class="w-8 h-8 rounded-full"/>
    </div>
  </header>

  <main class="max-w-7xl mx-auto px-4 py-6 flex flex-col lg:flex-row gap-6">
    <!-- Filters Sidebar -->
    <aside class="w-full lg:w-1/4 bg-white dark:bg-gray-800 rounded-lg shadow p-6 space-y-6">
      <h2 class="text-lg font-semibold">Filters</h2>
      <div class="space-y-4">
        <!-- Keyword -->
        <div>
          <label class="block text-sm font-medium">Keyword</label>
          <input id="filter-keyword" type="text" placeholder="Name, skills, title"
            class="mt-1 w-full px-3 py-2 bg-gray-100 dark:bg-gray-700 border rounded focus:ring-indigo-500 focus:border-indigo-500"/>
        </div>
        <!-- Location -->
        <div>
          <label class="block text-sm font-medium">Location</label>
          <input id="filter-location" type="text" placeholder="City or Remote"
            class="mt-1 w-full px-3 py-2 bg-gray-100 dark:bg-gray-700 border rounded focus:ring-indigo-500 focus:border-indigo-500"/>
        </div>
        <!-- Skills -->
        <div>
          <label class="block text-sm font-medium">Skills</label>
          <input id="filter-skills" type="text" placeholder="e.g. Python, React" 
            class="mt-1 w-full px-3 py-2 bg-gray-100 dark:bg-gray-700 border rounded focus:ring-indigo-500 focus:border-indigo-500"/>
          <p class="text-xs text-gray-500 dark:text-gray-400 mt-1">Comma-separated</p>
        </div>
        <!-- Experience -->
        <div>
          <label class="block text-sm font-medium">Experience (yrs)</label>
          <select id="filter-exp" class="mt-1 w-full px-3 py-2 bg-gray-100 dark:bg-gray-700 border rounded">
            <option value="">Any</option>
            <option>0-2</option>
            <option>3-5</option>
            <option>6-10</option>
            <option>10+</option>
          </select>
        </div>
        <button id="apply-filters" class="w-full py-2 bg-indigo-600 text-white rounded hover:bg-indigo-700">Apply Filters</button>
      </div>
    </aside>

    <!-- Results -->
    <section class="flex-1 flex flex-col">
      <!-- Top Bar: Search & View Toggle -->
      <div class="flex items-center justify-between mb-4">
        <input id="search-input" type="text" placeholder="Search candidates..."
          class="flex-1 px-4 py-2 bg-white dark:bg-gray-800 border border-gray-300 dark:border-gray-700 rounded focus:ring-indigo-500 focus:border-indigo-500"/>
        <div class="flex space-x-2 ml-4">
          <button id="grid-view-btn" class="p-2 bg-indigo-600 text-white rounded" title="Grid view">
            <svg class="h-5 w-5" fill="currentColor" viewBox="0 0 20 20">
              <path d="M3 3h6v6H3V3zM3 11h6v6H3v-6zM11 3h6v6h-6V3zM11 11h6v6h-6v-6z"/>
            </svg>
          </button>
          <button id="list-view-btn" class="p-2 bg-gray-200 dark:bg-gray-700 text-gray-600 dark:text-gray-300 rounded" title="List view">
            <svg class="h-5 w-5" fill="currentColor" viewBox="0 0 20 20">
              <path d="M4 6h12v2H4V6zm0 4h12v2H4v-2zm0 4h12v2H4v-2z"/>
            </svg>
          </button>
        </div>
      </div>

      <!-- Container -->
      <div id="results-container" class="flex-1 overflow-auto"></div>
    </section>
  </main>

  <script>
    // Theme toggle
    const htmlEl = document.documentElement,
          tgl = document.getElementById('theme-toggle'),
          iL = document.getElementById('icon-light'),
          iD = document.getElementById('icon-dark');
    tgl.onclick = () => {
      htmlEl.classList.toggle('dark');
      localStorage.setItem('theme', htmlEl.classList.contains('dark')?'dark':'light');
      iL.classList.toggle('hidden', !htmlEl.classList.contains('dark'));
      iD.classList.toggle('hidden', htmlEl.classList.contains('dark'));
    };
    (()=>{
      const t = localStorage.getItem('theme');
      if(t==='dark' || (!t && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        htmlEl.classList.add('dark');
      }
      iL.classList.toggle('hidden', !htmlEl.classList.contains('dark'));
      iD.classList.toggle('hidden', htmlEl.classList.contains('dark'));
    })();

    // Sample candidates
    const candidates = [
      { name:'Jane Doe', title:'Frontend Engineer', skills:['React','TypeScript'], exp:4, loc:'Bengaluru' },
      { name:'John Smith', title:'Backend Developer', skills:['Python','Django'], exp:6, loc:'Remote' },
      { name:'Aisha Khan', title:'DevOps Engineer', skills:['AWS','Docker'], exp:3, loc:'Mumbai' },
      // more...
    ];

    const container = document.getElementById('results-container'),
          gridBtn   = document.getElementById('grid-view-btn'),
          listBtn   = document.getElementById('list-view-btn');

    function renderGrid(list){
      container.innerHTML = `<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        ${list.map(c=>`
          <div class="bg-white dark:bg-gray-800 rounded-lg shadow p-6 flex flex-col">
            <h3 class="text-lg font-bold">${c.name}</h3>
            <p class="text-gray-600 dark:text-gray-400">${c.title}</p>
            <p class="text-sm text-gray-500 dark:text-gray-400 mt-2">Exp: ${c.exp} yrs • ${c.loc}</p>
            <div class="mt-2 space-x-1">
              ${c.skills.map(s=>`<span class="inline-block bg-indigo-100 text-indigo-800 dark:bg-indigo-800 dark:text-indigo-100 text-xs px-2 py-1 rounded">${s}</span>`).join('')}
            </div>
            <div class="mt-4 flex space-x-2">
              <a href="#" class="flex-1 text-center py-2 bg-indigo-600 text-white rounded hover:bg-indigo-700 text-sm">View Profile</a>
              <a href="#" class="flex-1 text-center py-2 bg-green-600 text-white rounded hover:bg-green-700 text-sm">Invite</a>
            </div>
          </div>`).join('')}
      </div>`;
    }

    function renderList(list){
      container.innerHTML = `<div class="overflow-auto">
        <table class="min-w-full bg-white dark:bg-gray-800 rounded-lg">
          <thead>
            <tr class="bg-gray-100 dark:bg-gray-700 text-left">
              <th class="px-4 py-2">Name</th>
              <th class="px-4 py-2">Title</th>
              <th class="px-4 py-2">Exp (yrs)</th>
              <th class="px-4 py-2">Location</th>
              <th class="px-4 py-2">Skills</th>
              <th class="px-4 py-2">Actions</th>
            </tr>
          </thead>
          <tbody>
            ${list.map(c=>`
              <tr class="border-b dark:border-gray-700 hover:bg-gray-50 dark:hover:bg-gray-700">
                <td class="px-4 py-2">${c.name}</td>
                <td class="px-4 py-2">${c.title}</td>
                <td class="px-4 py-2">${c.exp}</td>
                <td class="px-4 py-2">${c.loc}</td>
                <td class="px-4 py-2">${c.skills.join(', ')}</td>
                <td class="px-4 py-2 space-x-2">
                  <a href="#" class="px-3 py-1 bg-indigo-600 text-white rounded text-sm hover:bg-indigo-700">View</a>
                  <a href="#" class="px-3 py-1 bg-green-600 text-white rounded text-sm hover:bg-green-700">Invite</a>
                </td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>`;
    }

    // Initial render
    renderGrid(candidates);

    gridBtn.onclick = ()=>{
      renderGrid(candidates);
      gridBtn.classList.replace('bg-gray-200','bg-indigo-600');
      gridBtn.classList.replace('text-gray-600','text-white');
      listBtn.classList.replace('bg-indigo-600','bg-gray-200');
      listBtn.classList.replace('text-white','text-gray-600');
    };
    listBtn.onclick = ()=>{
      renderList(candidates);
      listBtn.classList.replace('bg-gray-200','bg-indigo-600');
      listBtn.classList.replace('text-gray-600','text-white');
      gridBtn.classList.replace('bg-indigo-600','bg-gray-200');
      gridBtn.classList.replace('text-white','text-gray-600');
    };

    // Filter & search logic
    document.getElementById('apply-filters').onclick = applyFilters;
    document.getElementById('search-input').oninput = applyFilters;

    function applyFilters(){
      const kw = document.getElementById('search-input').value.toLowerCase(),
            fk = document.getElementById('filter-keyword').value.toLowerCase(),
            loc= document.getElementById('filter-location').value.toLowerCase(),
            sk= document.getElementById('filter-skills').value.toLowerCase().split(',').map(s=>s.trim()).filter(s=>s),
            exp= document.getElementById('filter-exp').value;
      let filtered = candidates.filter(c=>{
        return (!kw||c.name.toLowerCase().includes(kw)||c.title.toLowerCase().includes(kw))
          && (!fk||c.name.toLowerCase().includes(fk)||c.title.toLowerCase().includes(fk)||c.skills.join(' ').toLowerCase().includes(fk))
          && (!loc||c.loc.toLowerCase().includes(loc))
          && (!exp|| (exp==='10+'? c.exp>=10 : (()=>{const [min,max]=exp.split('-'); return c.exp>=+min && c.exp<=+max;})()))
          && (sk.length===0 || sk.every(s=>c.skills.map(x=>x.toLowerCase()).includes(s)));
      });
      // preserve current view
      if (!gridBtn.classList.contains('bg-indigo-600')) {
        renderList(filtered);
      } else {
        renderGrid(filtered);
      }
    }
  </script>
</body>
</html>

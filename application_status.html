<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Application Status — Recrud</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    html { background: #F9FAFB; }
    html.dark { background: #111827; }
  </style>
</head>
<body class="min-h-screen text-gray-800 dark:text-gray-200">
  <!-- Header -->
  <header class="bg-white dark:bg-gray-800 shadow p-4 flex justify-between items-center">
    <h1 class="text-2xl font-semibold">Recrud</h1>
    <div class="flex items-center space-x-4">
      <button id="theme-toggle" class="p-2 rounded focus:ring-2 focus:ring-indigo-500">
        <svg id="icon-light" class="h-6 w-6 text-yellow-400 hidden" fill="currentColor"><path d="M10 3l1 2 2 .3-1.5 1 .3 2L10 8l-1.8.6.3-2L7 5.3l2-.3 1-2z"/></svg>
        <svg id="icon-dark" class="h-6 w-6 text-gray-200" fill="currentColor"><path d="M17.3 13.3a8 8 0 11-10.6-10.6 8 8 0 0010.6 10.6z"/></svg>
      </button>
      <img src="https://via.placeholder.com/32" alt="User" class="w-8 h-8 rounded-full"/>
    </div>
  </header>

  <main class="max-w-5xl mx-auto px-4 py-6 space-y-8">
    <h2 class="text-2xl font-semibold">My Applications</h2>

    <!-- Charts -->
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
      <!-- Status Distribution -->
      <div class="bg-white dark:bg-gray-800 rounded-lg shadow p-6">
        <h3 class="text-lg font-medium mb-4">Status Distribution</h3>
        <canvas id="statusChart" class="w-full h-64"></canvas>
      </div>
      <!-- Applications Over Time -->
      <div class="bg-white dark:bg-gray-800 rounded-lg shadow p-6">
        <h3 class="text-lg font-medium mb-4">Applications Over Time</h3>
        <canvas id="timeChart" class="w-full h-64"></canvas>
      </div>
    </div>

    <!-- Search / Filter -->
    <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4">
      <input id="search-input" type="text" placeholder="Search by job title or company"
        class="flex-1 px-4 py-2 bg-white dark:bg-gray-800 border border-gray-300 dark:border-gray-700 rounded focus:ring-indigo-500 focus:border-indigo-500"/>
      <button id="filter-btn" class="px-4 py-2 bg-indigo-600 text-white rounded hover:bg-indigo-700">Filter</button>
    </div>

    <!-- Applications Table -->
    <div class="overflow-auto bg-white dark:bg-gray-800 rounded-lg shadow">
      <table class="min-w-full table-auto">
        <thead>
          <tr class="bg-gray-100 dark:bg-gray-700 text-left">
            <th class="px-4 py-3">Job Title</th>
            <th class="px-4 py-3">Company</th>
            <th class="px-4 py-3">Applied On</th>
            <th class="px-4 py-3">Status</th>
            <th class="px-4 py-3">Actions</th>
          </tr>
        </thead>
        <tbody id="applications-body">
          <!-- Populated via JS -->
        </tbody>
      </table>
    </div>
  </main>

  <script>
    // Theme toggle
    const htmlEl = document.documentElement,
          toggle = document.getElementById('theme-toggle'),
          iconL = document.getElementById('icon-light'),
          iconD = document.getElementById('icon-dark');
    toggle.onclick = () => {
      htmlEl.classList.toggle('dark');
      localStorage.setItem('theme', htmlEl.classList.contains('dark')?'dark':'light');
      iconL.classList.toggle('hidden', !htmlEl.classList.contains('dark'));
      iconD.classList.toggle('hidden', htmlEl.classList.contains('dark'));
    };
    (()=>{
      const theme = localStorage.getItem('theme');
      if(theme==='dark' || (!theme && matchMedia('(prefers-color-scheme: dark)').matches)) {
        htmlEl.classList.add('dark');
      }
      iconL.classList.toggle('hidden', !htmlEl.classList.contains('dark'));
      iconD.classList.toggle('hidden', htmlEl.classList.contains('dark'));
    })();

    // Sample application data
    const applications = [
      { role:'Frontend Engineer', company:'Acme Corp', applied:'2025-05-10', status:'Interviewing' },
      { role:'Backend Developer', company:'BetaTech', applied:'2025-05-08', status:'Screening' },
      { role:'DevOps Specialist', company:'Cloudify', applied:'2025-05-05', status:'Applied' },
      { role:'Fullstack Engineer', company:'Delta Inc.', applied:'2025-04-30', status:'Offer' },
      { role:'UI/UX Designer', company:'Echo Studios', applied:'2025-04-28', status:'Rejected' },
      // duplicate dates for trend
      { role:'API Engineer', company:'Foxtrot', applied:'2025-05-08', status:'Applied' },
      { role:'Data Analyst', company:'Gamma LLC', applied:'2025-05-10', status:'Screening' }
    ];

    // Status badges classes
    const statusClasses = {
      'Applied':     'bg-gray-200 dark:bg-gray-700 text-gray-800 dark:text-gray-200',
      'Screening':   'bg-yellow-100 text-yellow-800',
      'Interviewing':'bg-blue-100 text-blue-800',
      'Offer':       'bg-green-100 text-green-800',
      'Rejected':    'bg-red-100 text-red-800'
    };

    // Render table
    const tbody = document.getElementById('applications-body');
    function renderApplications(list){
      tbody.innerHTML = list.map(app => `
        <tr class="border-b dark:border-gray-700 hover:bg-gray-50 dark:hover:bg-gray-700">
          <td class="px-4 py-3">${app.role}</td>
          <td class="px-4 py-3">${app.company}</td>
          <td class="px-4 py-3">${new Date(app.applied).toLocaleDateString()}</td>
          <td class="px-4 py-3">
            <span class="inline-block px-2 py-1 rounded text-sm ${statusClasses[app.status]||statusClasses['Applied']}">
              ${app.status}
            </span>
          </td>
          <td class="px-4 py-3 space-x-2">
            <a href="#" class="px-3 py-1 bg-indigo-600 text-white rounded text-sm hover:bg-indigo-700">View Status</a>
            <a href="#" class="px-3 py-1 bg-red-600 text-white rounded text-sm hover:bg-red-700">Withdraw</a>
          </td>
        </tr>
      `).join('');
    }

    // Search filter
    document.getElementById('search-input').oninput = e => {
      const q = e.target.value.toLowerCase();
      renderApplications(applications.filter(a =>
        a.role.toLowerCase().includes(q) ||
        a.company.toLowerCase().includes(q)
      ));
    };

    // Prepare data for charts
    const statusCounts = applications.reduce((acc, a) => {
      acc[a.status] = (acc[a.status] || 0) + 1;
      return acc;
    }, {});

    // Applications over time counts
    const dateCounts = applications.reduce((acc, a) => {
      const d = new Date(a.applied).toLocaleDateString();
      acc[d] = (acc[d] || 0) + 1;
      return acc;
    }, {});

    // Initialize charts on DOMContentLoaded
    document.addEventListener('DOMContentLoaded', () => {
      renderApplications(applications);

      // Status Doughnut
      new Chart(document.getElementById('statusChart'), {
        type: 'doughnut',
        data: {
          labels: Object.keys(statusCounts),
          datasets: [{
            data: Object.values(statusCounts),
            backgroundColor: ['#FBBF24','#60A5FA','#34D399','#EF4444','#9CA3AF']
          }]
        },
        options: { responsive:true, plugins:{ legend:{ position:'bottom' } } }
      });

      // Time Line
      new Chart(document.getElementById('timeChart'), {
        type: 'line',
        data: {
          labels: Object.keys(dateCounts).sort((a,b)=>new Date(a)-new Date(b)),
          datasets: [{
            label: 'Applications',
            data: Object.entries(dateCounts).sort((a,b)=>new Date(a[0])-new Date(b[0])).map(e=>e[1]),
            borderColor: '#6366F1',
            backgroundColor: 'rgba(99,102,241,0.1)',
            fill: true,
            tension: 0.3
          }]
        },
        options: { responsive:true, scales:{ y:{ beginAtZero:true } } }
      });
    });
  </script>
</body>
</html>
